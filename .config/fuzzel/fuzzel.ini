# =====================================================
# fuzzel — Cyberpunk neon theme (matches Waybar)
# =====================================================

font=MesloLGS NF:size=14
dpi-aware=yes
prompt="❯ "
icon-theme=Papirus-Dark
icons-enabled=yes

# レイアウト
lines=10
width=35
horizontal-pad=24
vertical-pad=20
inner-pad=12

# アイコンサイズ（デフォルトは 16px、これで大きめになる）
image-size-ratio=0.5

# 各行の高さ調整（アイコンが大きくなる分、行も広げる）
line-height=28

# 縦書き対応のため文字サイズに合わせて調整
letter-spacing=0

[colors]
# Waybarと同じ「ほぼ黒・わずかに透明」
background=0a0a0fee
text=ffffffff

# 入力中・プロンプト
prompt=00ffffff
placeholder=444466ff
input=ffffffff

# マッチした文字（検索でヒットした部分）はピンクで光らせる
match=ff6ec7ff

# 選択中の行(シアンのアクティブ感)
selection=00ffff22
selection-text=00ffffff
selection-match=ffe66dff

# 境界線
border=00ffffff

[border]
width=2
radius=8

[dmenu]
exit-immediately-if-empty=yes

[key-bindings]
# Ctrl+J/K で上下移動できるように(Vim風)
next=Down Control+j Control+n
prev=Up Control+k Control+p
