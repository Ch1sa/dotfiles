# プレフィックスキーを Ctrl-a に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# True Colorの有効化 (Ghostty/Neovim連携に必須)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# マウス操作を有効化
set -g mouse on

# ペイン分割のショートカット
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 設定リロード
bind r source-file ~/.tmux.conf \; display-message "✱ Config reloaded"

# Vimライクなペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ── ステータスバー（Powerlevel10k風） ──
set -g status-position bottom
set -g status-style 'bg=colour235,fg=colour39'
set -g status-left '#[bg=colour31,fg=colour232,bold]  #S #[bg=colour235,fg=colour31] '
set -g status-left-length 30
set -g status-right '#[fg=colour39,bold]%m/%d #[fg=colour39,bold]%H:%M '
set -g status-right-length 30

# ウィンドウタブ
set -g window-status-format '#[fg=colour243] #I:#W '
set -g window-status-current-format '#[bg=colour238,fg=colour39,bold] #I:#W #[fg=colour70]● '
set -g window-status-separator ''

# ペインの境界線
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39'

# タイトルバーにカレントディレクトリを表示
set -g set-titles on
set -g set-titles-string '#(echo "#{pane_current_path}" | sed "s|$HOME|~|")'

# タイトル更新を高速化
set -g status-interval 1

# 20260421追加
# ポップアップでyazi
bind f new-window -c "#{pane_current_path}" "yazi"

# ポップアップでshell（汎用、一時作業用）
bind o display-popup -E -w 80% -h 80%

# 画像プロトコルのパススルー
set -g allow-passthrough on
